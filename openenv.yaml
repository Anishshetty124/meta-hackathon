spec_version: 1
name: cloud-finops-auditor
version: 1.0.0
type: space
runtime: fastapi
app: main:app
port: 8000
description: Cloud FinOps & Security Auditor - AI agent environment for infrastructure cost optimization and security remediation
author: OpenEnv Hackathon Round 1

# Environment metadata
metadata:
  domain: cloud-operations
  task_type: optimization-and-security
  difficulty: intermediate
  estimated_episode_steps: 30-100

# Action space definition
action:
  type: object
  properties:
    command:
      type: string
      enum:
        - delete_resource
        - make_private
        - downsize_instance
        - upsize_instance
        - attach_resource
        - detach_resource
      description: "Operation to perform on cloud resources"
    resource_id:
      type: string
      minLength: 1
      maxLength: 100
      description: "Unique identifier of target resource (e.g., vol-unattached-001, s3-public-bucket)"
    parameters:
      type: object
      additionalProperties: true
      description: "Command-specific parameters (e.g., instance_type for downsize_instance)"
  required:
    - command
    - resource_id
  example:
    command: delete_resource
    resource_id: vol-unattached-001
    parameters: {}

# Observation space definition
observation:
  type: object
  properties:
    description:
      type: string
      description: "Human-readable state description with step count and progress"
    resources:
      type: array
      items:
        type: object
        properties:
          resource_id:
            type: string
            description: "Unique resource identifier"
          resource_type:
            type: string
            enum: [ec2_instance, s3_bucket, ebs_volume]
            description: "Type of cloud resource"
          monthly_cost:
            type: number
            minimum: 0
            maximum: 384
            description: "Monthly cost in USD"
          is_attached:
            type: boolean
            description: "For EBS volumes: whether volume is attached to instance"
          is_public:
            type: boolean
            description: "For S3 buckets: whether bucket is publicly readable"
          cpu_utilization:
            type: number
            minimum: 0
            maximum: 100
            description: "For EC2 instances: CPU utilization percentage"
          instance_type:
            type: string
            description: "For EC2 instances: instance type (t3.micro, t3.large, m5.2xlarge, etc.)"
          needs_fixing:
            type: boolean
            description: "Whether resource has optimization or security issues"
      description: "List of cloud resources in current state"
    monthly_cost:
      type: number
      minimum: 0
      description: "Total monthly infrastructure cost in USD"
    reward:
      type: number
      description: "Reward signal for last action (partial credit for progress)"
    done:
      type: boolean
      description: "Episode termination flag"
    completed_tasks:
      type: array
      items:
        type: string
        enum: [easy, medium, hard]
      description: "List of completed tasks"
    progress:
      type: object
      properties:
        easy:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: "Progress toward easy task completion"
        medium:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: "Progress toward medium task completion"
        hard:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: "Progress toward hard task completion"
      description: "Partial progress on each task (0.0 to 1.0)"
    info:
      type: object
      additionalProperties: true
      description: "Additional metadata and debugging information"
  required:
    - description
    - resources
    - monthly_cost
    - reward
    - done
    - completed_tasks
    - progress

# Reward specification
reward:
  type: number
  description: "Scalar reward signal per step"
  range: [-0.30, 0.70]
  specification:
    easy_task: 0.35
    medium_task: 0.50
    hard_task: 0.60
    efficiency_bonus: 0.00-0.06
    repeat_action_penalty: -0.03
    stalled_episode_penalty: -0.05
    reliability_risk_penalty: -0.12
    invalid_action: -0.05
    impossible_operation: -0.10

# Task definitions with grading logic
tasks:
  - name: easy
    title: "Delete Unattached EBS Volume"
    description: "Delete orphaned volume vol-unattached-001."
    difficulty: easy
    reward: 0.35
    grader:
      name: easy_resource_deleted
      type: agent
      criteria: "Resource vol-unattached-001 must be deleted (removed from resources list)"
      score_range: [0.0, 1.0]
    graders:
      - name: easy_resource_deleted
        type: agent
        criteria: "Resource vol-unattached-001 must be deleted (removed from resources list)"
        score_range: [0.0, 1.0]
    expected_steps: 1-3
    solved_by: "delete_resource command on unattached volume"

  - name: medium
    title: "Secure Public S3 Bucket"
    description: "Make public bucket s3-public-bucket private."
    difficulty: medium
    reward: 0.50
    grader:
      name: medium_bucket_private
      type: agent
      criteria: "Resource s3-public-bucket must have is_public=false"
      score_range: [0.0, 1.0]
    graders:
      - name: medium_bucket_private
        type: agent
        criteria: "Resource s3-public-bucket must have is_public=false"
        score_range: [0.0, 1.0]
    expected_steps: 1-5
    solved_by: "make_private command on public S3 bucket"

  - name: hard
    title: "Downsize Oversized EC2 Instance"
    description: "Downsize i-expensive-prod from m5.2xlarge to t3.large."
    difficulty: hard
    reward: 0.60
    grader:
      name: hard_instance_rightsized
      type: agent
      criteria: "Resource i-expensive-prod must have instance_type=t3.large"
      score_range: [0.0, 1.0]
    graders:
      - name: hard_instance_rightsized
        type: agent
        criteria: "Resource i-expensive-prod must have instance_type=t3.large"
        score_range: [0.0, 1.0]
    expected_steps: 1-10
    solved_by: "downsize_instance command with new instance type parameter"
    constraints: "Instance must have cpu_utilization < 50% and needs_fixing=true; safe target for production is t3.large"

# Episode configuration
episode:
  max_steps: 100
  reset_required: true
  deterministic: true
  supports_seed: true

# Baseline performance
baseline:
  agent_type: "hybrid-llm-heuristic"
  description: "Uses OpenAI-compatible LLM with fast heuristic fallback for action selection"
  expected_reward:
    optimal: 1.45  # All 3 tasks completed
    strong: 1.0-1.4  # 2-3 tasks completed
    baseline: 0.5-0.99  # 1-2 tasks completed
  expected_cost_savings:
    initial_cost: 365.0
    optimal_final_cost: 235.0  # After all optimizations
    expected_savings: 130.0
  expected_episodes_to_convergence: 3-5
  reproducibility: "Deterministic environment; scores depend on model stochasticity"

# Integration info
integration:
  framework: openenv
  api_version: "1.0"
  endpoints:
    reset: POST /reset
    step: POST /step
    state: GET /state
  required_env_vars:
    - API_BASE_URL
    - ENV_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
  optional_env_vars:
    - OPENAI_API_KEY
    - BASELINE_MODE
    - DEBUG
    - LOG_LEVEL

# Authors & licensing
authors:
  - name: "OpenEnv Hackathon Participant"
    role: "Primary Developer"

tags:
  - cloud-operations
  - cost-optimization
  - security
  - infrastructure
  - finops
  - multi-task
  - real-world
  - llm-agent

license: "OpenEnv Hackathon Round 1"
